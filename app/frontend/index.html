<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChoreBoard – Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="center">
    <div class="form-box">
      <h1 class="text-center mb-2">ChoreBoard 🏠</h1>
      <p class="text-center mb-2">Sign in to manage chores &amp; allowances</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="parent@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div id="errorMsg" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary btn-full mt-2" id="submitBtn">Sign in</button>
      </form>

      <p class="text-center mt-2 text-muted">
        No account? <a href="register.html">Register here</a> &nbsp;|&nbsp;
        <a href="child-login.html">Child login 👧</a>
      </p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
