<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChoreBoard – Child Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="center">
    <div class="form-box">
      <h1 class="text-center mb-2">👧 Child Login</h1>
      <p class="text-center mb-2">Select your name and enter your PIN</p>

      <form id="childLoginForm">
        <div class="form-group">
          <label for="childSelect">Who are you?</label>
          <select id="childSelect" required>
            <option value="">– loading… –</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pin">PIN</label>
          <input type="password" id="pin" maxlength="4" pattern="\d{4}" placeholder="••••" required />
        </div>
        <div id="errorMsg" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary btn-full mt-2" id="submitBtn">Sign in</button>
      </form>

      <p class="text-center mt-2 text-muted">
        Parent? <a href="index.html">Sign in here</a>
      </p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script type="module" src="js/child-login.js"></script>
</body>
</html>
