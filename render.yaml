services:
  - type: web
    name: opgaver-backend
    env: node
    rootDir: app/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 4000
      - key: FRONTEND_ORIGIN
        value: https://martinchrbuur-byte.github.io
